name: Evidence correction
description: Report a reproducibility, citation, scope, or epistemic error without submitting sensitive material.
title: "[Evidence correction] "
labels: ["evidence-correction"]
body:
  - type: markdown
    attributes:
      value: "Intake is in preview. Never submit confidential, privileged, client, patient, personal, paywalled, or employer-restricted material."
  - type: input
    id: artifact
    attributes:
      label: Affected public artifact or record ID
    validations:
      required: true
  - type: input
    id: public_source
    attributes:
      label: Public source URL and exact revision
    validations:
      required: true
  - type: textarea
    id: exact_locator
    attributes:
      label: Exact locator and reproducible observation
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Proposed bounded correction and what the source does not prove
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Public-source certification
      options:
        - label: I have not included confidential, privileged, client, personal, or restricted material.
          required: true

